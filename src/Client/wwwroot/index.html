<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaHub — Gestión de Talento</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TalentManagement.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;font-family:system-ui,sans-serif;color:#6b7280;">
            <img src="logo.png" alt="NovaHub" style="width:3rem;height:3rem;object-fit:contain;margin-bottom:.25rem;" />
            <div style="width:2rem;height:2rem;border:2px solid #e5e7eb;border-top-color:#4f46e5;border-radius:50%;animation:spin .65s linear infinite;"></div>
            <span style="font-size:.875rem;">Cargando NovaHub...</span>
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocurrió un error inesperado.
        <a href="." class="reload">Recargar</a>
        <span class="dismiss">✕</span>
    </div>
    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>
    <script src="js/jszip.min.js"></script>
    <script src="js/docx-preview.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // Exponer instancia MSAL para el picker de SharePoint
        window.addEventListener("load", () => {
            const interval = setInterval(() => {
                if (window.Microsoft && window.Microsoft.MSAL) {
                    clearInterval(interval);
                }
                // Buscar la instancia MSAL creada por Blazor
                const msalKey = Object.keys(sessionStorage).find(k => k.includes("msal"));
                if (msalKey || (window.msal && window.msal.PublicClientApplication)) {
                    clearInterval(interval);
                }
            }, 500);
        });

        // Helper para que el picker pueda obtener el token via MSAL
        window.getMsalInstance = function() {
            return window._msalInstance;
        };

        // Inyecta HTML completo en un iframe aislado
        window.setIframeContent = function(iframe, html) {
            if (!iframe) return;
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(html);
            doc.close();
        };

        // Muestra un PDF (data URL base64) en un iframe
        window.setPdfIframeSrc = function(iframe, dataUrl) {
            if (!iframe) return;
            iframe.src = dataUrl;
        };

        // Inicializa el editor de párrafos DOCX
        window.initDocxEditor = function(container, parrafos) {
            if (!container) return;
            parrafos.forEach(function(p) {
                var el = container.querySelector('[data-idx="' + p.indice + '"]');
                if (el) el.textContent = p.texto;
            });
        };

        // Lee el contenido actual de todos los párrafos editables
        window.getDocxEditorContent = function(container) {
            if (!container) return {};
            var result = {};
            container.querySelectorAll('[data-idx]').forEach(function(el) {
                result[parseInt(el.getAttribute('data-idx'))] = el.textContent;
            });
            return result;
        };

        // Descarga de PDF generado desde bytes base64
        window.descargarPdf = function(base64, fileName) {
            const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // Descarga genérica (PDF, DOCX, etc.) desde bytes base64
        window.descargarArchivo = function(base64, fileName, contentType) {
            const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: contentType || 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        // Renderiza un .docx (base64) en un iframe aislado usando docx-preview
        window.renderDocxPreview = async function(iframe, base64) {
            if (!iframe) return;
            try {
                const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
                const blob = new Blob([bytes], {
                    type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
                });

                // Inyectar docx-preview en el iframe para aislarlo del CSS de la app
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
                    <style>
                        * { box-sizing: border-box; }
                        html, body { margin: 0; padding: 0; background: #e5e7eb; }
                        .docx-wrapper { background: #e5e7eb !important; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; min-height: 100%; }
                        .docx-wrapper > section.docx { background: white !important; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
                    </style>
                </head><body><div id="root"></div></body></html>`);
                iframeDoc.close();

                // Copiar la función docx al contexto del iframe
                iframe.contentWindow.docx = window.docx;

                const container = iframeDoc.getElementById('root');
                await window.docx.renderAsync(blob, container, null, {
                    className: 'docx',
                    inWrapper: true,
                    ignoreWidth: false,
                    ignoreHeight: true,
                    ignoreFonts: false,
                    breakPages: true,
                    useBase64URL: true,
                    renderChanges: false,
                    renderHeaders: true,
                    renderFooters: true,
                    renderFootnotes: true,
                });
            } catch(e) {
                try {
                    const d = iframe.contentDocument || iframe.contentWindow.document;
                    d.body.innerHTML = '<div style="padding:2rem;color:#6b7280;text-align:center;font-family:sans-serif;">No se pudo renderizar la vista previa.</div>';
                } catch(_) {}
                console.error('docx-preview error:', e);
            }
        };

        // Editor de plantillas
        window.setEditorContent = function(element, html) {
            if (element && element.innerHTML !== undefined) {
                element.innerHTML = html || '';
            }
        };

        window.getEditorContent = function(element) {
            if (element && element.innerHTML !== undefined) {
                return element.innerHTML;
            }
            return '';
        };

        window.execEditorCommand = function(command, value) {
            document.execCommand(command, false, value);
        };

        window.insertAtCursor = function(element, text) {
            if (!element) return;
            element.focus();
            document.execCommand('insertText', false, text);
        };

        window.copiarTexto = function(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
                return true;
            }
            // Fallback for older browsers
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try {
                document.execCommand('copy');
                document.body.removeChild(textarea);
                return true;
            } catch (err) {
                document.body.removeChild(textarea);
                return false;
            }
        };
    </script>
</body>

</html>
